<text x="1194" y="390" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">HexDocs gives packages</text>
<text x="1194" y="418" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">a common public format</text>
