<text x="114" y="390" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">@moduledoc, @doc,</text>
<text x="114" y="418" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">@typedoc near code</text>
