<text x="384" y="390" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">BEAM doc chunks</text>
<text x="384" y="418" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">Code.fetch_docs/1</text>
<rect x="630" y="306" width="230" height="140" rx="28" fill="#ffedd5" stroke="#d7dce7" opacity="1.0"/>
<text x="654" y="350" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#f97316" text-anchor="start">Executable examples</text>
<text x="654" y="390" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">doctest ties docs</text>
<text x="654" y="418" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">to runnable examples</text>
<rect x="900" y="306" width="230" height="140" rx="28" fill="#ccfbf1" stroke="#d7dce7" opacity="1.0"/>
<text x="924" y="350" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#0f766e" text-anchor="start">Published docs</text>
<text x="924" y="390" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">ExDoc renders guides,</text>
<text x="924" y="418" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#142033" text-anchor="start">APIs, extras, grouping</text>
