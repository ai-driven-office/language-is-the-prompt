<rect x="90" y="526" width="1310" height="250" rx="28" fill="#f8fafc" stroke="#e5e7eb" opacity="1.0"/>
<text x="126" y="578" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="#142033" text-anchor="start">Why this may matter for model-facing quality</text>
<text x="138" y="628" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#7c3aed" text-anchor="start">•</text>
<text x="162" y="628" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#142033" text-anchor="start">Documentation lives next to the API surface, which reduces lookup ambiguity.</text>
<text x="138" y="670" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#7c3aed" text-anchor="start">•</text>
<text x="162" y="670" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#142033" text-anchor="start">Examples can be executable, so narrative guidance is partially checked against running code.</text>
<text x="138" y="712" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#7c3aed" text-anchor="start">•</text>
<text x="162" y="712" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#142033" text-anchor="start">Public and internal surfaces are deliberately separated with doc attributes rather than informal comments.</text>
<text x="138" y="754" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="800" fill="#7c3aed" text-anchor="start">•</text>
<text x="162" y="754" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#142033" text-anchor="start">ExDoc and HexDocs standardize the presentation layer across many libraries, increasing ecosystem regularity.</text>
<text x="72" y="844" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#58647a" text-anchor="start">Sources: Elixir docs, ExUnit doctest, ExDoc, HexDocs</text>
</svg>
