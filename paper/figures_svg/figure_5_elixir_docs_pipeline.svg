<text x="72" y="146" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" fill="#142033" text-anchor="start"><tspan x="72" dy="0">Elixir documentation pipeline: source metadata to</tspan><tspan x="72" dy="42">ecosystem-wide legibility</tspan></text>
<text x="72" y="238" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#58647a" text-anchor="start"><tspan x="72" dy="0">The documentation system is embedded in the toolchain rather than bolted on after the fact.</tspan></text>
